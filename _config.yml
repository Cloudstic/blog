title: The Cloudstic Engineering Blog
description: >-
  Engineering insights, cloud architecture, and technical deep dives
  from the Cloudstic team.
baseurl: ""
url: "https://blog.cloudstic.com"

theme: minima

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Social / SEO
twitter:
  username: cloudstic
social:
  name: Cloudstic
  links:
    - https://github.com/Cloudstic
    - https://twitter.com/cloudstic

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Cloudstic

# Author defaults
author: Cloudstic

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
